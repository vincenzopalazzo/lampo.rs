name: Sanity Check codebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node: [stable]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ matrix.node }}
          override: true

      - name: Run cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check

      - name: Run cargo test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

  lints:
    name: Lints
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

  deps:
    name: Dependency hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # Guards against the failure mode in #537: a bump of a single LDK crate
      # pulling in a second, incompatible `lightning` version. Every `lightning*`
      # crate must resolve to one version across the workspace.
      - name: Ensure a single LDK (lightning*) version
        run: |
          set -euo pipefail
          tree=$(cargo tree --workspace --duplicates --edges normal)
          dupes=$(printf '%s\n' "$tree" | grep -E '^lightning[a-z-]* v' | sort -u || true)
          if [ -n "$dupes" ]; then
            echo "::error::Multiple versions of LDK (lightning*) crates detected:"
            echo "$dupes"
            echo "Bump every lightning* crate together so the stack stays on one version."
            exit 1
          fi
          echo "OK: each lightning* crate resolves to a single version."

      # Guards the unified-chain-sync invariant (#545): the on-chain wallet
      # crate must stay free of LDK so it remains independently replaceable.
      - name: Ensure the on-chain wallet stays free of LDK
        run: ./tools/check-wallet-decoupling.sh
