## Lampo configuration example. Uncomment
## all the fields that you are interested in
## and set your bitcoin core information.

# type of backend that it is used
# Backend supported: bitcoin core (aka core)
backend=core

# bitcoin rpc url
core-url=http://127.0.0.1:38332

# bitcoin rpc user
core-user=lampo
# bitcoin rpc password
core-pass=lampo

# Level of the log level, default to info
# log-level=trace

# Log file where the information about the
# execution are stored
# log-file=/home/vincent/.lampo/signescorer

# The bitcoin network
# network=signet

# The port where lampo will listen about p2p connection
# port=39736

# Enable development sync mode (syncs every second instead of every 2 minutes)
# Only use this for development/testing purposes
# dev-sync=true

# Wallet sync start height.
#
# By default a restored wallet scans every block from its persisted checkpoint
# up to the chain tip, which can take days on long-running networks (e.g.
# Signet). The two options below skip that historical scan.
#
# WARNING: both options skip any on-chain history below the jump height, so the
# wallet will NOT discover funds received before it. Only use them for a fresh
# wallet or a restored wallet with no on-chain history to recover. The default
# (full scan) is the safe choice on mainnet.

# Jump the wallet checkpoint to the current chain tip on startup (see issue #540).
# Equivalent to passing `--fast-sync` on the command line.
# fast-sync=true

# Jump the wallet checkpoint to a specific block height instead of the tip
# (see issue #444). Useful when you know the wallet's birthday height.
# reindex=307000
